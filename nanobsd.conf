NANO_NAME="stratipi"
NANO_IMG1NAME="${NANO_NAME}.img"

NANO_PLAN="embedded"
NANO_BOARDNAME="RPI"
NANO_DRIVE=sdda0

NANO_REVISION="15.1"
NANO_BRANCH="RELEASE"

# Sizes in bytes
NANO_MEDIASIZE="8G"
NANO_RAM_TMPVARSIZE="100Mi"

NANO_PKGBASE_LIST="FreeBSD-kernel-generic-mmccam FreeBSD-set-minimal FreeBSD-console-tools FreeBSD-bsdconfig FreeBSD-ssh FreeBSD-pf FreeBSD-ipf FreeBSD-ipfw FreeBSD-libexecinfo"
NANO_LOADER_KERNEL="kernel.GENERIC-MMCCAM"

NANO_CUSTOMIZE="cust_comconsole cust_allow_ssh_root cust_pkgng cust_install_files"

SRC="/home/jlduran/Developer/${NANO_NAME}"

NANO_PACKAGE_DIR="/usr/local/poudriere/data/packages/${NANO_NAME}-latest/All"
NANO_PACKAGE_LIST=$(awk '!/^#/ && NF' ${SRC}/pkglist)
NANO_PACKAGE_LIST="${NANO_PACKAGE_LIST} net/wifi-firmware-mt7601u-kmod"

# /cfg partition files
NANO_CFGDIR="${SRC}/cfg"
NANO_METALOG_CFG="${SRC}/cfg.mtree"

# Override files
NANO_CUST_FILESDIR="${SRC}/Files"
NANO_CUST_FILES_MTREE="${SRC}/Files.mtree"

# Configure ttys and console devices
cust_comconsole() {
	# Enable getty on console
	sed -i "" -e '/^ttyu[0-3]/s/onifconsole/off/' ${NANO_WORLDDIR}/etc/ttys

	# Set the dashboard terminal
	sed -i "" -e '/^ttyv7/s/getty Pc"\t/getty dashboard"/' ${NANO_WORLDDIR}/etc/ttys

	# Disable unused terminals
	sed -i "" -e 's/^ttyv8/#ttyv8/' ${NANO_WORLDDIR}/etc/ttys
	sed -i "" -e 's/^dcons/#dcons/' ${NANO_WORLDDIR}/etc/ttys
	sed -i "" -e 's/^xc0/#xc0/' ${NANO_WORLDDIR}/etc/ttys
	sed -i "" -e 's/^rcons/#rcons/' ${NANO_WORLDDIR}/etc/ttys

	if $do_precompiled && [ -z "$NANO_NOPKGBASE" ]; then
		tgt_pkg_update_file_sha256 etc/ttys
		tgt_pkg_update_config_files_content etc/ttys
	fi
}

last_orders() {
	pprint 2 "Compressing final binary disk image"
	zstd --fast=1 -T0 "${NANO_DISKIMGDIR}/${NANO_IMG1NAME}" -o "${NANO_DISKIMGDIR}/${NANO_IMG1NAME}.zst" --quiet --force --rm
}
